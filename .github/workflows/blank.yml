name: Travel Monitors

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  delta-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python monitor.py

  southwest-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python southwest_monitor.py
